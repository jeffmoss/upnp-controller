apiVersion: apps/v1
kind: Deployment
metadata:
  name: upnp-controller
  namespace: upnp-controller
  labels:
    app: upnp-controller
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: upnp-controller
  template:
    metadata:
      labels:
        app: upnp-controller
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: upnp-controller
      containers:
        - name: controller
          image: upnp-controller:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: LOG_LEVEL
              value: "warn"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
            - name: notify
              containerPort: 9091
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 30
