apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: portmappings.upnp.k8s.io
  annotations:
    api-approved.kubernetes.io: "https://github.com/kubernetes/kubernetes/pull/0000"
spec:
  group: upnp.k8s.io
  names:
    kind: PortMapping
    listKind: PortMappingList
    plural: portmappings
    singular: portmapping
    shortNames:
      - pm
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [externalPort, internalHost, internalPort, protocol]
              properties:
                externalPort:
                  type: integer
                  minimum: 1
                  maximum: 65535
                  description: Port on the router's WAN side
                internalHost:
                  type: string
                  description: LAN IP to forward to
                internalPort:
                  type: integer
                  minimum: 1
                  maximum: 65535
                  description: Internal port to forward to
                protocol:
                  type: string
                  enum: [TCP, UDP]
                  description: Transport protocol
                description:
                  type: string
                  description: UPnP mapping description
            status:
              type: object
              properties:
                active:
                  type: boolean
                externalIP:
                  type: string
                leaseExpiry:
                  type: string
                  format: date-time
                lastRenewal:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, reason]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: External Port
          type: integer
          jsonPath: .spec.externalPort
        - name: Internal Host
          type: string
          jsonPath: .spec.internalHost
        - name: Protocol
          type: string
          jsonPath: .spec.protocol
        - name: Active
          type: boolean
          jsonPath: .status.active
        - name: External IP
          type: string
          jsonPath: .status.externalIP
