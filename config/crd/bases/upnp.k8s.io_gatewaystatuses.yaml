apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gatewaystatuses.upnp.k8s.io
  annotations:
    api-approved.kubernetes.io: "https://github.com/kubernetes/kubernetes/pull/0000"
spec:
  group: upnp.k8s.io
  names:
    kind: GatewayStatus
    listKind: GatewayStatusList
    plural: gatewaystatuses
    singular: gatewaystatus
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                externalIP:
                  type: string
                gatewayURL:
                  type: string
                subscriptionID:
                  type: string
                subscriptionExpiry:
                  type: string
                  format: date-time
                lastSeen:
                  type: string
                  format: date-time
                ready:
                  type: boolean
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: External IP
          type: string
          jsonPath: .status.externalIP
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Last Seen
          type: date
          jsonPath: .status.lastSeen
