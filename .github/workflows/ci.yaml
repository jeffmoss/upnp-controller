name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
      - run: cargo clippy -- -D warnings
      - name: Check chart appVersion matches Cargo.toml
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          CHART_VERSION=$(grep '^appVersion' chart/upnp-controller/Chart.yaml | sed 's/.*"\(.*\)"/\1/')
          if [ "$CARGO_VERSION" != "$CHART_VERSION" ]; then
            echo "Version mismatch: Cargo.toml=$CARGO_VERSION Chart.yaml appVersion=$CHART_VERSION"
            exit 1
          fi
