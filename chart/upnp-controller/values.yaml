image:
  repository: ghcr.io/jeffmoss/upnp-controller
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

logLevel: warn

# Optional: override SSDP-discovered gateway URL
gatewayUrl: ""

# GENA eventing
gena:
  enabled: true

# Polling intervals (seconds)
polling:
  interval: 600       # when GENA is active (backup)
  fastInterval: 10    # when GENA is unavailable

rbac:
  create: true

serviceAccount:
  create: true
  name: upnp-controller

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi
